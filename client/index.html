<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 1 API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Project 1 API</h1>
    <p>This page loads items from your API.</p>

    <div id="items"></div>

    <h2>Add a New Item</h2>
    <form id="addForm">
        <input type="text", id="itemName" placeholder="Item name">
        <button type="submit">Add</button>
    </form>

    <script> 
        document.querySelector("#addForm").addEventListener("submit", async (e) => 
        { 
            e.preventDefault(); 
            
            const name = document.querySelector("#itemName").value;
            
            await fetch("/api/items", 
            { 
                method: "POST", 
                headers: 
                    { "Content-Type": "application/json" },
                body: JSON.stringify({ name }) 
            }); 

            document.querySelector("itemName").value = ""; // clear input
            loadItems(); // refreshes the list
        });
    </script>
</body>
</html>
